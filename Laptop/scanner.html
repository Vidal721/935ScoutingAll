<!DOCTYPE html>
<html>
<head>
    <title>935 Scanner</title>
    <script src="js/html5-qrcode.min.js"></script>
    <style>
        :root { --gold: #FFD700; --black: #000; --dark: #1a1a1a; --success: #28a745; }
        
        body { 
            font-family: sans-serif; 
            background: var(--black); 
            color: white; 
            margin: 0; 
            text-align: center; 
            padding-bottom: 40px;
        }

        .stats-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 10px 20px; 
            background: var(--dark); 
            border-bottom: 2px solid var(--gold); 
            position: sticky; 
            top: 0; 
            z-index: 10; 
        }
        
        .back-btn { background: #333; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }

        .scanner-container {
            padding: 10px;
            background: #0a0a0a;
        }

        .progress-section { margin-bottom: 10px; }
        .progress-bg { height: 16px; background: #333; border-radius: 8px; overflow: hidden; border: 1px solid #444; }
        #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.2s ease; }
        #part-indicator { margin-top: 5px; font-weight: bold; color: var(--gold); font-size: 0.85rem; text-transform: uppercase; }

        #reader { 
            width: 100%; 
            max-width: 480px; 
            margin: 0 auto; 
            border: 2px solid #333 !important; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000;
        }

        .btn-group { margin: 15px; display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 20px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; flex: 1; max-width: 180px; }
        .btn-csv { background: var(--gold); color: black; }
        .btn-danger { background: #441111; color: #ff4444; border: 1px solid #661111; }
        .btn-start { background: var(--gold); color: black; width: 90%; font-size: 1.1rem; margin-top: 10px; padding: 15px; }

        .table-wrap { overflow-x: auto; margin: 10px; border-radius: 8px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; background: var(--dark); font-size: 0.8rem; }
        th { background: #222; color: var(--gold); padding: 10px; text-align: left; border-bottom: 2px solid var(--gold); }
        td { padding: 8px; border-bottom: 1px solid #222; text-align: left; }

        #success-overlay {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 9999; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .success-circle {
            width: 120px; height: 120px;
            border-radius: 50%; border: 6px solid var(--success);
            display: flex; align-items: center; justify-content: center;
            animation: scaleUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .checkmark {
            width: 60px; height: 30px;
            border-left: 6px solid var(--success);
            border-bottom: 6px solid var(--success);
            transform: rotate(-45deg);
            margin-top: -12px;
            animation: drawCheck 0.3s 0.2s ease forwards;
            opacity: 0;
        }

        @keyframes scaleUp { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes drawCheck { from { opacity: 0; transform: rotate(-45deg) scale(0.5); } to { opacity: 1; transform: rotate(-45deg) scale(1); } }

        .success-text { color: #1a1a1a; margin-top: 25px; font-weight: 800; font-size: 1.8rem; }
    </style>
</head>
<body>

    <div id="success-overlay">
        <div class="success-circle"><div class="checkmark"></div></div>
        <div class="success-text">SCAN COMPLETE</div>
    </div>

    <div class="stats-bar">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <div id="status" style="font-size: 0.75rem; color: #888;">STATUS: STANDBY</div>
        <div style="font-weight: bold;">SCANS: <span id="total-count" style="color:var(--gold)">0</span></div>
    </div>

    <div class="scanner-container">
        <div class="progress-section">
            <div class="progress-bg"><div id="progress-fill"></div></div>
            <div id="part-indicator">READY TO SCAN</div>
        </div>
        
        <button id="start-btn" class="btn btn-start" onclick="initCamera()">📸 START SCANNER</button>
        <div id="reader"></div>
    </div>

    <div class="btn-group">
        <button class="btn btn-csv" onclick="downloadJSON()">📊 JSON</button>
        <button class="btn btn-danger" onclick="clearData()">🗑️ CLEAR</button>
    </div>

    <div class="table-wrap">
        <table id="data-table">
            <thead><tr id="table-headers"><th>Time</th><th>Summary</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <script>
        let allResults = JSON.parse(localStorage.getItem('scouting_results') || '[]');
        let activeChunks = {};
        let totalChunksExpected = 0;
        let isProcessing = false;

        const html5QrCode = new Html5Qrcode("reader");

        function initCamera() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').innerText = "STATUS: ACTIVE";

            const config = { 
                fps: 25, 
                qrbox: (viewWidth, viewHeight) => {
                    let size = Math.min(viewWidth, viewHeight) * 0.8;
                    return { width: size, height: size };
                }
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
                .catch(err => {
                    alert("Camera Error: " + err);
                    document.getElementById('start-btn').style.display = 'block';
                });
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return;

            const pipeIndex = decodedText.indexOf('|');
            if (pipeIndex === -1) return;

            const header = decodedText.substring(0, pipeIndex);
            const chunkData = decodedText.substring(pipeIndex + 1);
            const [current, total] = header.split('/').map(Number);

            if (isNaN(current) || isNaN(total)) return;

            if (totalChunksExpected === 0) totalChunksExpected = total;

            if (!activeChunks[current]) {
                activeChunks[current] = chunkData;
                updateProgress();
                if(navigator.vibrate) navigator.vibrate(40);
            }

            if (Object.keys(activeChunks).length === totalChunksExpected) {
                isProcessing = true;
                assembleFinalData();
            }
        }

        function updateProgress() {
            const count = Object.keys(activeChunks).length;
            const percent = (count / totalChunksExpected) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('part-indicator').innerText = `PART ${count} / ${totalChunksExpected}`;
        }

        function assembleFinalData() {
            let fullDataString = "";
            for (let i = 1; i <= totalChunksExpected; i++) {
                fullDataString += activeChunks[i];
            }

            if (allResults.some(r => r.raw === fullDataString)) {
                alert("Duplicate skipped.");
                resetScanner();
                return;
            }

            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            allResults.push({ time: timestamp, raw: fullDataString });
            localStorage.setItem('scouting_results', JSON.stringify(allResults));
            
            updateTable();
            document.getElementById('total-count').innerText = allResults.length;
            triggerSuccessAnimation();
        }

        function triggerSuccessAnimation() {
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(function() {
                overlay.style.display = 'none';
                resetScanner();
            }, 1000);
        }

        function resetScanner() {
            activeChunks = {};
            totalChunksExpected = 0;
            isProcessing = false;
            document.getElementById('progress-fill').style.width = "0%";
            document.getElementById('part-indicator').innerText = "READY";
        }

        function updateTable() {
            const tbody = document.getElementById('table-body');
            const theadRow = document.getElementById('table-headers');
            tbody.innerHTML = "";
            if (allResults.length === 0) return;

            const fields = allResults[0].raw.split('|');
            theadRow.innerHTML = "<th>Time</th>" + fields.map(f => `<th>${f.split(':')[0]}</th>`).join('');

            allResults.slice().reverse().forEach(res => {
                let rowHtml = `<td>${res.time}</td>`;
                res.raw.split('|').forEach(v => {
                    rowHtml += `<td>${v.split(':')[1] || "-"}</td>`;
                });
                tbody.innerHTML += `<tr>${rowHtml}</tr>`;
            });
        }

        // ============================================================
        //  EXPORT — outputs flat named fields instead of coded array
        //
        //  Raw string format (pipe-delimited key:value pairs):
        //    "S:Austin|M:8|T:5422|A:blue|Sc:5|E:19|events:..."
        //
        //  Output JSON (one object per scan):
        //    {
        //      "time": "10:26 AM",
        //      "scouter": "Austin",
        //      "matchNumber": "8",
        //      "teamNumber": 5422,
        //      "alliance": "blue",
        //      "score": "5",
        //      "endgame": "19",
        //      "events": "Entered Blue Alliance(auto), ..."
        //    }
        // ============================================================

        // Maps short QR codes to human-readable field names.
        // Add/change entries here as your scouting form evolves.
        const FIELD_MAP = {
            'S':      'scouter',
            'M':      'matchNumber',
            'T':      'teamNumber',
            'A':      'alliance',
            'Sc':     'score',
            'E':      'endgame',     // now comes from the Endgame form field
            'EV':     'eventCount',  // raw event count from the field tracker
            'events': 'events',      // keep the raw event string as "events"
            // Add more mappings here, e.g. 'D': 'defense', 'C': 'climb'
        };

        function parseRawToObject(time, rawString) {
            const entry = { time };

            rawString.split('|').forEach(part => {
                const colonIdx = part.indexOf(':');
                if (colonIdx === -1) return;

                const code  = part.substring(0, colonIdx).trim();
                const value = part.substring(colonIdx + 1).trim();

                // Look up the friendly field name, fall back to the raw code
                const fieldName = FIELD_MAP[code] || code;

                // Coerce teamNumber to an integer
                entry[fieldName] = (fieldName === 'teamNumber') ? parseInt(value) || value : value;
            });

            return entry;
        }

        function downloadJSON() {
            if (allResults.length === 0) return alert("No data!");

            const dataToExport = allResults.map(r => parseRawToObject(r.time, r.raw));

            const jsonString = JSON.stringify(dataToExport, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url  = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.href = url;
            link.download = `scout_data_${Date.now()}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function clearData() {
            if (confirm("Clear ALL scans?")) {
                localStorage.removeItem('scouting_results');
                location.reload();
            }
        }

        updateTable();
        document.getElementById('total-count').innerText = allResults.length;
    </script>
</body>
</html>
